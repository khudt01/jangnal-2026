<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 96" role="img" aria-label="이룸센터에서 국회의사당역 3번 출구를 지나 백년찌개집까지 도보 약 6분 경로">
  <style>
    text{font-family:'Noto Sans KR','Malgun Gothic','Apple SD Gothic Neo',sans-serif}
    .name{font-size:9px;font-weight:700;fill:#3a3930}
    .sub{font-size:8px;fill:#8a8770}
  </style>

  <!-- 도보 시간 배지 -->
  <rect x="103" y="4" width="64" height="17" rx="8.5" fill="#178e8e"/>
  <text x="135" y="16" text-anchor="middle" font-size="9.5" font-weight="700" fill="#fff">도보 약 6분</text>

  <!-- 경로(걷는 길): 베이스 선 + 주황 점선(발걸음) -->
  <line x1="40" y1="50" x2="230" y2="50" stroke="#e9ddc4" stroke-width="6" stroke-linecap="round"/>
  <line x1="52" y1="50" x2="218" y2="50" stroke="#e06a25" stroke-width="3" stroke-linecap="round" stroke-dasharray="0.5 7"/>

  <!-- 출발: 이룸센터 -->
  <circle cx="40" cy="50" r="7" fill="#fff" stroke="#e06a25" stroke-width="3"/>
  <text x="40" y="70" text-anchor="middle" class="name">이룸센터</text>
  <text x="40" y="81" text-anchor="middle" class="sub">출발</text>

  <!-- 경유: 국회의사당역(9호선) -->
  <circle cx="135" cy="50" r="9" fill="#b0982f"/>
  <text x="135" y="53.5" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">9</text>
  <text x="135" y="70" text-anchor="middle" class="name">국회의사당역</text>
  <text x="135" y="81" text-anchor="middle" class="sub">3번 출구</text>

  <!-- 도착: 백년찌개집 -->
  <circle cx="230" cy="50" r="7" fill="#178e8e"/>
  <circle cx="230" cy="50" r="2.6" fill="#fff"/>
  <text x="230" y="70" text-anchor="middle" class="name">백년찌개집</text>
  <text x="230" y="81" text-anchor="middle" class="sub">도착</text>
</svg>
